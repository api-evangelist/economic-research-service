apis:
  - aid: economic-research-service:ers-data-apis
    name: USDA ERS Data APIs
    description: >-
      Access ERS data products in machine-readable formats for analysis or
      integration into your own applications. Delivered via api.data.gov as
      REST endpoints. Requires an api.data.gov key.
    humanURL: https://www.ers.usda.gov/developer/data-apis
    baseURL: https://api.ers.usda.gov
    tags:
      - Agriculture
      - Data
      - Economics
    properties:
      - url: https://www.ers.usda.gov/developer/data-apis
        type: Documentation
      - url: https://api.data.gov/signup/
        type: SignUp
  - aid: economic-research-service:ers-geospatial-apis
    name: USDA ERS Geospatial APIs
    description: >-
      Integrate ERS map layers into the GIS package of your choice, on their
      own or mashed up with other geospatial data.
    humanURL: https://www.ers.usda.gov/developer/geospatial-apis
    baseURL: https://www.ers.usda.gov
    tags:
